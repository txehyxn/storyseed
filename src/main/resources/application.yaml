spring:
  application:
    name: storyseed

  datasource:
    url: jdbc:mysql://localhost:3306/storyseed?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-seconds: 3600
