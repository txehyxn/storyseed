<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>새 이야기 | StorySeed</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
<main class="auth-card story-card">
    <a class="brand" th:href="@{/home}" href="/home">StorySeed</a>
    <h1>어떤 이야기를 시작할까요?</h1>
    <p>먼저 선택한 장르가 이야기의 중심이 됩니다. 1개에서 3개까지 골라주세요.</p>

    <form id="story-form" th:action="@{/stories}" th:object="${request}" method="post">
        <div id="selected-genre-inputs"></div>
        <div class="genre-grid">
            <button
                    th:each="genre : ${genres}"
                    class="genre-option"
                    type="button"
                    th:data-value="${genre.name()}"
                    th:text="${genre.displayName}"
            >판타지</button>
        </div>

        <section class="selection-summary" aria-live="polite">
            <strong>선택 순서</strong>
            <ol id="selected-genres"></ol>
        </section>

        <p class="message error"
           th:if="${#fields.hasAnyErrors()}"
           th:each="error : ${#fields.allErrors()}"
           th:text="${error}"></p>

        <button id="start-button" type="submit">이야기 시작하기</button>
    </form>
</main>

<script>
    const selected = [];
    const genreButtons = document.querySelectorAll(".genre-option");
    const selectedGenres = document.getElementById("selected-genres");
    const selectedInputs = document.getElementById("selected-genre-inputs");

    genreButtons.forEach((button) => {
        button.addEventListener("click", () => {
            const value = button.dataset.value;
            const existingIndex = selected.findIndex((genre) => genre.value === value);

            if (existingIndex >= 0) {
                selected.splice(existingIndex, 1);
                button.classList.remove("selected");
            } else if (selected.length < 3) {
                selected.push({value, label: button.textContent});
                button.classList.add("selected");
            }

            renderSelection();
        });
    });

    function renderSelection() {
        selectedGenres.replaceChildren();
        selectedInputs.replaceChildren();

        selected.forEach((genre) => {
            const item = document.createElement("li");
            item.textContent = genre.label;
            selectedGenres.appendChild(item);

            const input = document.createElement("input");
            input.type = "hidden";
            input.name = "genres";
            input.value = genre.value;
            selectedInputs.appendChild(input);
        });
    }
</script>
</body>
</html>
