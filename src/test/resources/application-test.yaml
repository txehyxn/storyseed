spring:
  datasource:
    url: jdbc:h2:mem:storyseed;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

jwt:
  secret: storyseed-test-secret-key-long-enough-for-hs256
  access-token-expiration-seconds: 3600
